<svg width="512" height="512" viewBox="0 0 512 512" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <!-- 꿈 테마: 인디고-퍼플 그라디언트 -->
    <radialGradient id="bg" cx="0.4" cy="0.3" r="0.85">
      <stop offset="0" stop-color="#818cf8"/>
      <stop offset="0.5" stop-color="#4f46e5"/>
      <stop offset="1" stop-color="#1e1b4b"/>
    </radialGradient>
    <!-- 광택 하이라이트 (gummi 효과) -->
    <radialGradient id="hi" cx="0.4" cy="0.2" r="0.5">
      <stop offset="0" stop-color="white" stop-opacity="0.75"/>
      <stop offset="0.6" stop-color="white" stop-opacity="0.1"/>
      <stop offset="1" stop-color="white" stop-opacity="0"/>
    </radialGradient>
    <!-- 하단 그림자 (입체감) -->
    <radialGradient id="bot" cx="0.55" cy="0.9" r="0.5">
      <stop offset="0" stop-color="#0a0820" stop-opacity="0.5"/>
      <stop offset="1" stop-color="#0a0820" stop-opacity="0"/>
    </radialGradient>
    <!-- 글자 그림자 블러 -->
    <filter id="blur" x="-20%" y="-20%" width="140%" height="140%">
      <feGaussianBlur stdDeviation="3"/>
    </filter>
    <!-- 초승달 마스크: 원에서 원을 빼서 crescent 생성 -->
    <mask id="moon">
      <circle cx="394" cy="88" r="30" fill="white"/>
      <circle cx="409" cy="80" r="24" fill="black"/>
    </mask>
  </defs>

  <!-- 배경 라운드 사각형 -->
  <rect width="512" height="512" rx="120" fill="url(#bg)"/>
  <!-- 하단 그림자 -->
  <rect width="512" height="512" rx="120" fill="url(#bot)"/>
  <!-- 상단 광택 (gummi gloss) -->
  <ellipse cx="200" cy="150" rx="200" ry="110" fill="url(#hi)"/>
  <!-- 스페큘러 하이라이트 -->
  <ellipse cx="160" cy="118" rx="44" ry="18" fill="white" fill-opacity="0.55"/>

  <!-- 초승달 -->
  <circle cx="394" cy="88" r="30" fill="white" fill-opacity="0.9" mask="url(#moon)"/>

  <!-- 별 장식 -->
  <circle cx="432" cy="72" r="4.5" fill="white" fill-opacity="0.85"/>
  <circle cx="358" cy="60" r="3" fill="white" fill-opacity="0.6"/>
  <circle cx="448" cy="118" r="2.5" fill="white" fill-opacity="0.7"/>
  <circle cx="340" cy="100" r="2" fill="white" fill-opacity="0.5"/>
  <!-- 십자 별 (큰 것) -->
  <path d="M432 56 L432 88 M416 72 L448 72" stroke="white" stroke-width="2.5" stroke-opacity="0.0"/>
  <circle cx="432" cy="72" r="4.5" fill="white" fill-opacity="0.85"/>

  <!-- 글자 그림자 (입체감) -->
  <text x="256" y="386"
        font-family="system-ui, -apple-system, 'Helvetica Neue', sans-serif"
        font-size="340" font-weight="800"
        fill="#0a0820" fill-opacity="0.3"
        text-anchor="middle" letter-spacing="-14"
        filter="url(#blur)">g</text>
  <!-- 글자 본체 -->
  <text x="256" y="378"
        font-family="system-ui, -apple-system, 'Helvetica Neue', sans-serif"
        font-size="340" font-weight="800"
        fill="white"
        text-anchor="middle" letter-spacing="-14">g</text>
</svg>
